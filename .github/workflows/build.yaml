name: "Build"

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_NOLOGO: true
      DOTNET_GENERATE_ASPNET_CERTIFICATE: false
      DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: false
      DOTNET_MULTILEVEL_LOOKUP: 0
      DOTNET_SYSTEM_CONSOLE_ALLOW_ANSI_COLOR_REDIRECTION: true
      TERM: xterm
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
      Configuration: Release
      source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    outputs:
      GitBuildVersionSimple: ${{ steps.version.outputs.GitBuildVersionSimple }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          source-url: ${{ env.source-url }}
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Restore
        run: dotnet restore editorconfig-dedup.slnx

      - name: Build
        run: dotnet build editorconfig-dedup.slnx --no-restore

      - name: Get version
        id: version
        run: |
          set -o pipefail

          echo "$GitBuildVersionSimple"
          echo "GitBuildVersionSimple=$GitBuildVersionSimple" >> "$GITHUB_OUTPUT"

      - name: Dump environment
        run: printenv | sort

      - name: Test
        run: dotnet test --project tests/tests.csproj --no-build --no-progress

      - name: Pack
        run: dotnet pack dotnet-editorconfig-dedup/dotnet-editorconfig-dedup.csproj --no-build

      - name: Test install
        run: |
          ls -al dotnet-editorconfig-dedup/nupkg

          dotnet tool install --global dotnet-editorconfig-dedup --source dotnet-editorconfig-dedup/nupkg --version $NBGV_SemVer2

      - name: NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: dotnet-editorconfig-dedup/nupkg/*.nupkg

  update_release_draft:
    name: Update release draft
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    if: github.ref == 'refs/heads/main' # Running this job only for main branch
    steps:
      - uses: actions/checkout@v6

      - uses: release-drafter/release-drafter@v7
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: ${{ needs.build.outputs.GitBuildVersionSimple }}

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"

      - name: Upload assets
        uses: xresloader/upload-to-github-release@v1
        with:
          file: "artifacts/*.nupkg"
          delete_file: "*.nupkg"
          overwrite: true
          release_id: ${{ steps.create_release.outputs.id }}
